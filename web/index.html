<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive PDF Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --border-bright: #2e2e4e;
  --accent: #00ff88;
  --accent-dim: rgba(0,255,136,0.12);
  --accent-glow: rgba(0,255,136,0.35);
  --text: #e2e2f0;
  --text-dim: #6b6b8a;
  --error: #ff4466;
  --warn: #ffaa00;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  overflow-x: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Glow blob */
body::after {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(0,255,136,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 640px;
}

/* Header */
.header {
  margin-bottom: 40px;
  text-align: center;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(0,255,136,0.25);
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 20px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

h1 {
  font-family: var(--mono);
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

h1 span {
  color: var(--accent);
}

.subtitle {
  margin-top: 10px;
  font-size: 14px;
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.01em;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 16px;
  transition: border-color 0.3s;
}

.card:focus-within {
  border-color: var(--border-bright);
}

/* Input group */
.input-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: block;
}

.input-wrap {
  position: relative;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

@media (max-width: 480px) {
  .input-wrap { flex-direction: column; }
}

input[type="text"] {
  flex: 1;
  min-width: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

input[type="text"]::placeholder {
  color: var(--text-dim);
  font-size: 12px;
}

input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

/* Button */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 14px 24px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}

.btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn:active:not(:disabled) {
  transform: translateY(0);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn.loading .btn-icon { display: none; }
.btn.loading .btn-spinner { display: block; }
.btn-spinner { display: none; }

@keyframes spin {
  to { transform: rotate(360deg); }
}
.spin { animation: spin 0.8s linear infinite; display: inline-block; }

@media (max-width: 480px) {
  .btn { width: 100%; }
}

/* Terminal log */
.log-card {
  background: #06060b;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: none;
  animation: fadeUp 0.3s ease;
}

.log-card.visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.log-titlebar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.dots {
  display: flex;
  gap: 6px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.dot.red { background: #ff5f56; }
.dot.yellow { background: #ffbd2e; }
.dot.green { background: #27c93f; }

.log-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

.log-body {
  padding: 16px;
  height: 220px;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.8;
  scrollbar-width: thin;
  scrollbar-color: var(--border-bright) transparent;
}

.log-body::-webkit-scrollbar { width: 4px; }
.log-body::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

.log-line {
  display: flex;
  gap: 10px;
  align-items: baseline;
  animation: lineIn 0.2s ease;
}

@keyframes lineIn {
  from { opacity: 0; transform: translateX(-4px); }
  to { opacity: 1; transform: translateX(0); }
}

.log-line .prefix { color: var(--accent); user-select: none; flex-shrink: 0; }
.log-line .text { color: #b0b0cc; }
.log-line.error .text { color: var(--error); }
.log-line.success .text { color: var(--accent); }
.log-line.warn .text { color: var(--warn); }

/* Status bar */
.status-bar {
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
}

.status-dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.status-dot.err { background: var(--error); }

/* Donate */
.donate-hint {
  margin-top: 32px;
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
  opacity: 0.6;
  transition: opacity 0.3s;
}
.donate-hint:hover { opacity: 1; }

.donate-link {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--sans);
  font-size: 12px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-style: dotted;
  padding: 0;
  transition: color 0.2s;
}
.donate-link:hover { color: var(--text); }

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.open { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 380px;
  animation: modalUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}

@keyframes modalUp {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--border);
  border: none;
  color: var(--text-dim);
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.modal-close:hover { background: var(--border-bright); color: var(--text); }

.modal-emoji { font-size: 32px; margin-bottom: 12px; }

.modal h3 {
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text);
  margin-bottom: 6px;
}

.modal p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 24px;
}

.donate-methods {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.donate-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  transition: border-color 0.2s;
}
.donate-item:hover { border-color: var(--border-bright); }

.donate-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.donate-icon.momo { background: rgba(169,0,105,0.15); }
.donate-icon.mbb { background: rgba(0,136,255,0.12); }

.donate-info { flex: 1; min-width: 0; }
.donate-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.donate-number {
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text);
  letter-spacing: 0.05em;
}

.copy-btn {
  background: var(--border);
  border: none;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.copy-btn:hover { background: var(--border-bright); color: var(--text); }
.copy-btn.copied { color: var(--accent); }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="badge">v1.0 · tool</div>
    <h1>Drive PDF <span>Downloader</span></h1>
    <p class="subtitle">Tải tài liệu PDF bị chặn từ Google Drive</p>
  </div>

  <div class="card">
    <label class="input-label" for="url">&#x2192; Google Drive URL</label>
    <div class="input-wrap">
      <input
        type="text"
        id="url"
        placeholder="https://drive.google.com/file/d/..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button class="btn" id="dlBtn" onclick="download()">
        <span class="btn-icon">&#x2193; Tải về</span>
        <span class="btn-spinner"><span class="spin">&#x21BB;</span> Đang xử lý</span>
      </button>
    </div>
  </div>

  <div class="log-card" id="logCard">
    <div class="log-titlebar">
      <div class="dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <span class="log-title">process.log</span>
    </div>
    <div class="log-body" id="log"></div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Sẵn sàng</span>
  </div>

  <div class="donate-hint">
    Tool miễn phí &middot; <button class="donate-link" onclick="openDonate()">ủng hộ tác giả ☕</button>
  </div>

</div>

<!-- Donate modal -->
<div class="modal-overlay" id="donateModal" onclick="closeDonateOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeDonate()">&#x2715;</button>
    <div class="modal-emoji">&#x2615;</div>
    <h3>Ủng hộ tác giả</h3>
    <p>Tool hoàn toàn miễn phí. Nếu thấy hữu ích, một ly cà phê nhỏ là động lực lớn để mình tiếp tục duy trì 🙏</p>
    <div class="donate-methods">
      <div class="donate-item">
        <div class="donate-icon momo">🩷</div>
        <div class="donate-info">
          <div class="donate-label">Momo</div>
          <div class="donate-number">0768920314</div>
        </div>
        <button class="copy-btn" onclick="copyText('0768920314', this)">COPY</button>
      </div>
      <div class="donate-item">
        <div class="donate-icon mbb">🏦</div>
        <div class="donate-info">
          <div class="donate-label">MB Bank</div>
          <div class="donate-number">0768920314</div>
        </div>
        <button class="copy-btn" onclick="copyText('0768920314', this)">COPY</button>
      </div>
    </div>
  </div>
</div>

<script>
const logEl = document.getElementById("log")
const logCard = document.getElementById("logCard")
const dlBtn = document.getElementById("dlBtn")
const statusDot = document.getElementById("statusDot")
const statusText = document.getElementById("statusText")

function setStatus(type, text) {
  statusDot.className = "status-dot " + (type || "")
  statusText.textContent = text
}

function addLog(text, type) {
  logCard.classList.add("visible")
  const line = document.createElement("div")
  line.className = "log-line" + (type ? " " + type : "")
  const isError = text.toUpperCase().includes("ERROR") || text.toUpperCase().includes("FAIL")
  const isSuccess = text.toUpperCase().includes("SUCCESS") || text.toUpperCase().includes("COMPLETE") || text.toUpperCase().includes("GENERATED")
  if (isError) line.classList.add("error")
  else if (isSuccess) line.classList.add("success")
  line.innerHTML = `<span class="prefix">›</span><span class="text">${text}</span>`
  logEl.appendChild(line)
  logEl.scrollTop = logEl.scrollHeight
}

function setLoading(on) {
  dlBtn.disabled = on
  dlBtn.classList.toggle("loading", on)
}

async function download() {
  logEl.innerHTML = ""
  logCard.classList.remove("visible")

  const url = document.getElementById("url").value.trim()
  if (!url) {
    addLog("ERROR: Vui lòng nhập URL", "error")
    setStatus("err", "Thiếu URL")
    return
  }

  setLoading(true)
  setStatus("", "Đang xử lý...")
  addLog("Gửi yêu cầu tới server...")

  try {
    const r = await fetch("/download", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    })

    const data = await r.json()
    data.log.forEach(t => addLog(t))

    if (!data.success) {
      addLog("Tải thất bại. Kiểm tra URL và thử lại.", "error")
      setStatus("err", "Thất bại")
      setLoading(false)
      return
    }

    addLog("Đang chuẩn bị file PDF...")

    const binary = atob(data.pdf)
    const arr = new Uint8Array(binary.length)
    for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i)

    const blob = new Blob([arr], { type: "application/pdf" })
    const a = document.createElement("a")
    a.href = URL.createObjectURL(blob)
    a.download = "drive.pdf"
    a.click()

    addLog("Tải xuống thành công ✓", "success")
    setStatus("ok", "Hoàn thành")

  } catch (e) {
    addLog("ERROR: " + e.message, "error")
    setStatus("err", "Lỗi kết nối")
  }

  setLoading(false)
}

// Enter key support
document.getElementById("url").addEventListener("keydown", e => {
  if (e.key === "Enter") download()
})

function openDonate() {
  document.getElementById("donateModal").classList.add("open")
}
function closeDonate() {
  document.getElementById("donateModal").classList.remove("open")
}
function closeDonateOutside(e) {
  if (e.target === document.getElementById("donateModal")) closeDonate()
}
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓ ĐÃ COPY"
    btn.classList.add("copied")
    setTimeout(() => {
      btn.textContent = "COPY"
      btn.classList.remove("copied")
    }, 2000)
  })
}
</script>

</body>
</html>
